<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081323" />
      <stop offset="100%" stop-color="#0d1f39" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#60d8ff" />
      <stop offset="100%" stop-color="#8e6bff" />
    </linearGradient>
  </defs>
  <rect width="920" height="260" rx="24" fill="url(#bg)" stroke="#3db3ff" stroke-width="2" />
  <text x="34" y="44" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#eefaff">Project Carousel</text>
  <text x="34" y="72" font-family="Segoe UI, sans-serif" font-size="14" fill="#9dbfee">A rotating highlight of current work, polished interfaces, and product goals.</text>
  <rect x="44" y="94" width="250" height="120" rx="18" fill="#0d1f3b" stroke="#56d2ff" stroke-width="1.5" />
