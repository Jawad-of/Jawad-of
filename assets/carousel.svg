  <text x="650" y="126" font-family="Segoe UI, sans-serif" font-size="15" fill="#c9e8ff">Portfolio Website</text>
  <text x="650" y="146" font-family="Segoe UI, sans-serif" font-size="12" fill="#99c5ff">Personal brand hub with modern project showcase.</text>
  <rect x="44" y="220" width="60" height="16" rx="8" fill="#1f406b" />
  <rect x="60" y="222" width="26" height="12" rx="6" fill="#60d8ff">
    <animate attributeName="x" values="60;120;180" dur="6s" repeatCount="indefinite" />
