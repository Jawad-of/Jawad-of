  <text x="60" y="146" font-family="Segoe UI, sans-serif" font-size="12" fill="#99c5ff">Endless runner build, core mechanics, leaderboard UX.</text>
  <rect x="340" y="94" width="250" height="120" rx="18" fill="#0d1f3b" stroke="#56d2ff" stroke-width="1.5" />
  <text x="356" y="126" font-family="Segoe UI, sans-serif" font-size="15" fill="#c9e8ff">Gun Shot - Sounds Clone</text>
  <text x="356" y="146" font-family="Segoe UI, sans-serif" font-size="12" fill="#99c5ff">Mobile audio interface with crisp UX and performance focus.</text>
