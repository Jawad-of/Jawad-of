<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 70" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="typeGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#61d9ff" />
      <stop offset="100%" stop-color="#8a76ff" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#48d6ff" />
      <stop offset="100%" stop-color="#7f7bff" />
    </linearGradient>
  </defs>
  <rect width="1200" height="70" rx="18" fill="#07182f" stroke="#2f84ff" stroke-width="1.5" />
  <text x="40" y="35" font-family="Inter, sans-serif" font-size="22" fill="#c6e6ff">Initializing system...</text>
  <text x="40" y="55" font-family="Inter, sans-serif" font-size="18" fill="url(#typeGrad)">
    <tspan>» </tspan>
    <tspan font-weight="700">Loading Unity profile HUD</tspan>
  </text>
  <rect x="900" y="24" width="240" height="22" rx="11" fill="#0d243f" stroke="#4ad4ff" stroke-width="1" />
  <rect x="900" y="24" width="160" height="22" rx="11" fill="url(#barGrad)">
    <animate attributeName="width" values="0;160;140;160" dur="2s" repeatCount="indefinite" />
  </rect>
  <text x="960" y="40" font-family="Inter, sans-serif" font-size="12" fill="#d6e8ff">78% complete</text>
</svg>
