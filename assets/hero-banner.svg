<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#010814" />
      <stop offset="100%" stop-color="#08142a" />
    </linearGradient>
    <linearGradient id="hudGlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#57e2ff" />
      <stop offset="100%" stop-color="#8f66ff" />
    </linearGradient>
    <linearGradient id="textGlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6ae4ff" />
      <stop offset="100%" stop-color="#9f7bff" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="340" fill="url(#bg)" />
  <g opacity="0.14">
    <path d="M0 45 H1200" stroke="#08345f" stroke-width="1" />
    <path d="M0 180 H1200" stroke="#0b2f5e" stroke-width="1" />
    <path d="M0 290 H1200" stroke="#0a263f" stroke-width="1" />
  </g>
  <path d="M60 90 H1140" stroke="#1b4f8f" stroke-width="1.5" opacity="0.8" />
  <rect x="60" y="110" width="540" height="190" rx="28" fill="rgba(255,255,255,0.04)" stroke="#4af0ff" stroke-width="1.8" />
  <g filter="url(#glow)">
    <text x="90" y="170" font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="none" stroke="url(#textGlow)" stroke-width="2">JAWAD-AHMED</text>
  </g>
  <text x="90" y="215" font-family="Inter, sans-serif" font-size="24" fill="#cfdeff">Unity Game Developer • Gameplay Programmer • Creative Systems</text>
  <text x="90" y="250" font-family="Inter, sans-serif" font-size="18" fill="#9dbff4">Player profile online. Mission status: Ready for AAA / Indie pipeline.</text>
  <rect x="90" y="265" width="420" height="26" rx="13" fill="#071b33" stroke="#4af0ff" stroke-width="1" />
  <text x="102" y="283" font-family="Inter, sans-serif" font-size="13" fill="#88cfff">PROFILE LOADING...</text>
  <text x="320" y="283" font-family="Inter, sans-serif" font-size="13" fill="#8dafff">UNITY DEV | MOBILE | PC | WEBGL</text>
  <g>
    <rect x="675" y="72" width="440" height="220" rx="26" fill="rgba(6,18,36,0.8)" stroke="#3b98ff" stroke-width="1.6" />
    <text x="705" y="112" font-family="Inter, sans-serif" font-size="16" fill="#9dc9ff">SYSTEM</text>
    <text x="705" y="154" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Unity</text>
    <text x="705" y="190" font-family="Inter, sans-serif" font-size="16" fill="#9dc9ff">ROLE</text>
    <text x="705" y="226" font-family="Inter, sans-serif" font-size="28" fill="#cfe9ff">Gameplay</text>
    <text x="705" y="254" font-family="Inter, sans-serif" font-size="14" fill="#83b7ff">TIMEZONE: PKT +5</text>
    <circle cx="1020" cy="280" r="18" fill="none" stroke="#4af0ff" stroke-width="2">
      <animate attributeName="r" values="18;22;18" dur="2.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="1020" cy="280" r="8" fill="#4af0ff" />
  </g>
</svg>
