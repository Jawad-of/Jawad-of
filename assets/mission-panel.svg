  <text x="34" y="162" font-family="Segoe UI, sans-serif" font-size="15" fill="#bfe3ff">- UI polish, feedback systems, and score loops</text>
  <text x="34" y="186" font-family="Segoe UI, sans-serif" font-size="15" fill="#bfe3ff">- Build a stronger GitHub profile for recruiters</text>
  <rect x="600" y="116" width="256" height="56" rx="14" fill="url(#accent)" opacity="0.92" />
  <text x="620" y="148" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#071226">Priority: High</text>
  <text x="620" y="168" font-family="Segoe UI, sans-serif" font-size="12" fill="#081d2d">Progress: 84% Complete</text>
