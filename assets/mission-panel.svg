<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07141e" />
      <stop offset="100%" stop-color="#091727" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#53d7ff" />
      <stop offset="100%" stop-color="#8c6bff" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="200" rx="24" fill="url(#bg)" stroke="#3bb0ff" stroke-width="2" />
  <text x="34" y="46" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#eff6ff">Current Mission</text>
  <text x="34" y="74" font-family="Segoe UI, sans-serif" font-size="14" fill="#9fc6ff">Launch new gameplay systems, polish mobile UX, and grow open source impact.</text>
  <text x="34" y="114" font-family="Segoe UI, sans-serif" font-size="15" fill="#bfe3ff">- Game prototype iteration</text>
