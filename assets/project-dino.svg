<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="cardBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081322" />
      <stop offset="100%" stop-color="#0d1d34" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2ad8ff" />
      <stop offset="100%" stop-color="#7f6dff" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="260" rx="24" fill="url(#cardBg)" stroke="#2ad8ff" stroke-width="2" />
  <text x="28" y="50" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#eef6ff">Chrome Dino Game</text>
  <text x="28" y="82" font-family="Segoe UI, sans-serif" font-size="14" fill="#98b9ff">Unity recreation of the iconic endless runner with polished controls.</text>
  <rect x="28" y="102" width="444" height="98" rx="12" fill="#0c1f37" />
  <text x="40" y="132" font-family="Segoe UI, sans-serif" font-size="15" fill="#b4d6ff">- Endless gameplay loop</text>
  <text x="40" y="156" font-family="Segoe UI, sans-serif" font-size="15" fill="#b4d6ff">- Responsive jump controls</text>
  <text x="40" y="180" font-family="Segoe UI, sans-serif" font-size="15" fill="#b4d6ff">- Dynamic obstacle spawning</text>
  <text x="40" y="204" font-family="Segoe UI, sans-serif" font-size="15" fill="#b4d6ff">- Score tracking and polish improvements</text>
  <rect x="350" y="34" width="120" height="28" rx="10" fill="url(#accent)" opacity="0.95" />
  <text x="364" y="53" font-family="Segoe UI, sans-serif" font-size="13" fill="#041623">In Development</text>
</svg>
